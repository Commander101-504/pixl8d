<!DOCTYPE html>
<html>
    <head>
        <title>Pixl8d</title>
        <style>
            :root {
                --bg: #1a1a1a;
                --surface: #2a2a2a;
                --border: #444;
                --text: #ffffff;
            }
            
            :root.light {
                --bg: #f0f0f0;
                --surface: #ffffff;
                --border: #999;
                --text: #000000;
            }
            body {
                background-color: var(--bg);
                width: 100vw;
                height: 100vh;
                position: absolute;
                top: 0;
                left: 0;
                overflow: hidden;
                display: flex;
                justify-content: center;
                align-items: center;
            }
            #appContainer {
                display: flex;
                flex-direction: row;
                position: relative;
            }
            #palette {
                height: 600px;
                width: 160px;
                display: flex;
                flex-direction: column;
                flex-wrap: wrap;
                align-content: space-evenly;
                gap: 2px;
            }
            #sideOptions {
                width: 75px;
                display: flex;
                flex-direction: column;
                align-items: center;
            }
            #sizeButton, #brushButton {
                width: 75px;
                height: 75px;
                background-color: white;
                color: black;
                border: 1px solid var(--border);
                font-size: 0.75rem;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                text-align: center;
                user-select: none;
                box-sizing: border-box;
            }
            #sizeButton:hover, #brushButton:hover {
                background-color: #eee;
            }
            #sizePopover, #brushPopover {
                position: absolute;
                display: none;
                flex-direction: row;
                background-color: var(--surface);
                border: 1px solid var(--border);
                z-index: 9999;
            }
            .sizeOption, .brushOption {
                width: 73px;
                height: 73px;
                display: flex;
                align-items: center;
                justify-content: center;
                color: var(--text);
                font-size: 0.75rem;
                cursor: pointer;
                text-align: center;
                user-select: none;
                box-sizing: border-box;
            }
            .sizeOption:hover, .brushOption:hover {
                background-color: var(--surface);
            }
            .sizeOption.selected, .brushOption.selected {
                background-color: var(--surface);
                font-weight: bold;
            }
        </style>
    </head>
    <body>
        <div id="appContainer">
            <div id="sideOptions">
                <div id="sizeButton">16x16</div>
                <div id="brushButton">1px</div>
            </div>
            <div id="sizePopover">
                <div class="sizeOption" data-size="4">4x4</div>
                <div class="sizeOption" data-size="8">8x8</div>
                <div class="sizeOption selected" data-size="16">16x16</div>
                <div class="sizeOption" data-size="32">32x32</div>
                <div class="sizeOption" data-size="64">64x64</div>
            </div>
            <div id="brushPopover">
                <div class="brushOption selected" data-brush="1">1px</div>
                <div class="brushOption" data-brush="2">2px</div>
                <div class="brushOption" data-brush="4">4px</div>
                <div class="brushOption" data-brush="8">8px</div>
            </div>
            <canvas id="canvas"></canvas>
            <div id="palette"></div>
        </div>
        <input type="color" id="colorPicker" style="display:none;">
        <input type="file" id="JSONImport" accept=".json" style="display:none;">
        <input type="file" id="paletteImport" accept=".hex" style="display:none;">

        <script>
            const canvas = document.querySelector("#canvas");
            const ctx = canvas.getContext("2d");
            canvas.style.border = "1px dashed black";
            const colorPicker = document.querySelector("#colorPicker");
            const palette = document.querySelector("#palette");
            const sizeButton = document.querySelector("#sizeButton");
            const sizePopover = document.querySelector("#sizePopover");
            const sizeOptions = document.querySelectorAll(".sizeOption");
            const brushButton = document.querySelector("#brushButton");
            const brushPopover = document.querySelector("#brushPopover");
            const brushOptions = document.querySelectorAll(".brushOption");
            const sizes = [4, 8, 16, 32, 64];
            const brushSizes = [1, 2, 4, 8];

            let isDrawing = false;
            let isErasing = false;
            let currentColor = "#000000";
            let isGridOn = true;
            let currentTool = "Brush";
            let isSymmetricalX = false;
            let isSymmetricalY = false;
            document.title = "Pixl8d - Brush";
            let brushSize = 1;
            
            let zoomLevel = 1;
            let panX = 0;
            let panY = 0;
            let isPanning = false;
            let lastMouseX = 0;
            let lastMouseY = 0;
            let spaceHeld = false;
            
            let undoStack = [];
            let redoStack = [];

            let selectedSwatch = 0;
            let swatches = [
                "#060608", "#141013", "#3b1725", "#73172d",
                "#b4202a", "#df3e23", "#fa6a0a", "#f9a31b",
                "#ffd541", "#fffc40", "#d6f264", "#9cdb43",
                "#59c135", "#14a02e", "#1a7a3e", "#24523b",
                "#122020", "#143464", "#285cc4", "#249fde",
                "#20d6c7", "#a6fcdb", "#ffffff", "#fef3c0",
                "#fad6b8", "#f5a097", "#e86a73", "#bc4a9b",
                "#793a80", "#403353", "#242234", "#221c1a",
                "#322b28", "#71413b", "#bb7547", "#dba463",
                "#f4d29c", "#dae0ea", "#b3b9d1", "#8b93af",
                "#6d758d", "#4a5462", "#333941", "#422433",
                "#5b3138", "#8e5252", "#ba756a", "#e9b5a3",
                "#e3e6ff", "#b9bffb", "#849be4", "#588dbe",
                "#477d85", "#23674e", "#328464", "#5daf8d",
                "#92dcba", "#cdf7e2", "#e4d2aa", "#c7b08b",
                "#a08662", "#796755", "#5a4e44", "#423934"
            ];
            
            canvas.width = 600;
            canvas.height = 600;
            
            let GRID_SIZE = 16;
            let CELL_SIZE = canvas.width / GRID_SIZE;

            function updateSizeButton() {
                sizeButton.textContent = GRID_SIZE + "x" + GRID_SIZE;
                const selectedIndex = sizes.indexOf(GRID_SIZE);
                const buttonRect = sizeButton.getBoundingClientRect();
                const appRect = document.querySelector("#appContainer").getBoundingClientRect();
                sizePopover.style.top = (buttonRect.top - appRect.top) + "px";
                sizePopover.style.left = (buttonRect.left - appRect.left - selectedIndex * 75) + "px";
                sizeOptions.forEach((opt, i) => {
                    opt.classList.toggle("selected", i === selectedIndex);
                });
            }

            // updates brush button label and repositions popover
            function updateBrushButton() {
                brushButton.textContent = brushSize + "px";
                const selectedIndex = brushSizes.indexOf(brushSize);
                const buttonRect = brushButton.getBoundingClientRect();
                const appRect = document.querySelector("#appContainer").getBoundingClientRect();
                brushPopover.style.top = (buttonRect.top - appRect.top) + "px";
                brushPopover.style.left = (buttonRect.left - appRect.left - selectedIndex * 75) + "px";
                brushOptions.forEach((opt, i) => {
                    opt.classList.toggle("selected", i === selectedIndex);
                });
            }

            sizeButton.addEventListener("click", function(e) {
                e.stopPropagation();
                brushPopover.style.display = "none";
                const isVisible = sizePopover.style.display === "flex";
                if (isVisible) {
                    sizePopover.style.display = "none";
                } else {
                    updateSizeButton();
                    sizePopover.style.display = "flex";
                }
            });

            brushButton.addEventListener("click", function(e) {
                e.stopPropagation();
                sizePopover.style.display = "none";
                const isVisible = brushPopover.style.display === "flex";
                if (isVisible) {
                    brushPopover.style.display = "none";
                } else {
                    updateBrushButton();
                    brushPopover.style.display = "flex";
                }
            });

            sizeOptions.forEach(function(opt) {
                opt.addEventListener("click", function() {
                    GRID_SIZE = parseInt(opt.getAttribute("data-size"));
                    CELL_SIZE = canvas.width / GRID_SIZE;
                    zoomLevel = 1;
                    panX = 0;
                    panY = 0;
                    createGrid();
                    drawGrid();
                    updateSizeButton();
                    sizePopover.style.display = "none";
                });
            });

            brushOptions.forEach(function(opt) {
                opt.addEventListener("click", function() {
                    brushSize = parseInt(opt.getAttribute("data-brush"));
                    updateBrushButton();
                    brushPopover.style.display = "none";
                });
            });

            document.addEventListener("click", function() {
                sizePopover.style.display = "none";
                brushPopover.style.display = "none";
            });
            
            let grid = [];
            
            function createGrid() {
                grid = [];
                for (let row = 0; row < GRID_SIZE; row++) {
                    grid[row] = [];
                    for (let col = 0; col < GRID_SIZE; col++) {
                        grid[row][col] = "#ffffff";
                    }
                }
            }
            
            createGrid();
            
            function drawGrid() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (let row = 0; row < GRID_SIZE; row++) {
                    for (let col = 0; col < GRID_SIZE; col++) {
                        ctx.fillStyle = grid[row][col];
                        ctx.fillRect(
                            col * CELL_SIZE * zoomLevel + panX,
                            row * CELL_SIZE * zoomLevel + panY,
                            CELL_SIZE * zoomLevel + 0.5,
                            CELL_SIZE * zoomLevel + 0.5
                        );
                        ctx.strokeStyle = isGridOn ? "#cccccc" : "transparent";
                        ctx.strokeRect(
                            col * CELL_SIZE * zoomLevel + panX,
                            row * CELL_SIZE * zoomLevel + panY,
                            CELL_SIZE * zoomLevel,
                            CELL_SIZE * zoomLevel
                        );
                    }
                }
            }
            
            function paintCell(pixelY, pixelX, color) {
                for (let i = 0; i < brushSize; i++) {
                    for (let k = 0; k < brushSize; k++) {
                        let row = pixelY - Math.floor(brushSize / 2) + i;
                        let col = pixelX - Math.floor(brushSize / 2) + k;
                        if (col < 0 || col >= GRID_SIZE || row < 0 || row >= GRID_SIZE) continue;
                        grid[row][col] = color;
                        if (isSymmetricalX) grid[row][GRID_SIZE - 1 - col] = color;
                        if (isSymmetricalY) grid[GRID_SIZE - 1 - row][col] = color;
                        if (isSymmetricalX && isSymmetricalY) grid[GRID_SIZE - 1 - row][GRID_SIZE - 1 - col] = color;
                    }
                }
            }

            function eventToCell(e) {
                let x = e.offsetX;
                let y = e.offsetY;
                return {
                    pixelX: Math.floor((x - panX) / (CELL_SIZE * zoomLevel)),
                    pixelY: Math.floor((y - panY) / (CELL_SIZE * zoomLevel))
                };
            }
            
            function handleDrawing(event) {
                if (!isDrawing) return;
                let { pixelX, pixelY } = eventToCell(event);
                if (pixelX < 0 || pixelX >= GRID_SIZE || pixelY < 0 || pixelY >= GRID_SIZE) return;
                if (currentTool === "Fill") {
                    floodFill(pixelY, pixelX, grid[pixelY][pixelX]);
                } else if (currentTool === "Eyedropper") {
                    currentColor = grid[pixelY][pixelX];
                } else {
                    paintCell(pixelY, pixelX, currentTool === "Eraser" ? "#ffffff" : currentColor);
                }
                drawGrid();
            }
            
            canvas.addEventListener("mousedown", function(e) {
                if (spaceHeld) {
                    isPanning = true;
                    lastMouseX = e.clientX;
                    lastMouseY = e.clientY;
                    canvas.style.cursor = "grabbing";
                    return;
                }
                if (currentTool !== "Eyedropper") saveSnapshot();
                isDrawing = true;
                handleDrawing(e);
            });

            canvas.addEventListener("contextmenu", function(e) {
                e.preventDefault();
                saveSnapshot();
                isErasing = true;
                let { pixelX, pixelY } = eventToCell(e);
                if (pixelX < 0 || pixelX >= GRID_SIZE || pixelY < 0 || pixelY >= GRID_SIZE) return;
                paintCell(pixelY, pixelX, "#ffffff");
                drawGrid();
            });
            
            canvas.addEventListener("mousemove", function(e) {
                if (isPanning) {
                    let dx = e.clientX - lastMouseX;
                    let dy = e.clientY - lastMouseY;
                    panX += dx;
                    panY += dy;
                    panX = Math.min(0, Math.max(panX, -(GRID_SIZE * CELL_SIZE * zoomLevel - canvas.width)));
                    panY = Math.min(0, Math.max(panY, -(GRID_SIZE * CELL_SIZE * zoomLevel - canvas.height)));
                    lastMouseX = e.clientX;
                    lastMouseY = e.clientY;
                    drawGrid();
                    return;
                }
                if (isErasing) {
                    let { pixelX, pixelY } = eventToCell(e);
                    if (pixelX < 0 || pixelX >= GRID_SIZE || pixelY < 0 || pixelY >= GRID_SIZE) return;
                    paintCell(pixelY, pixelX, "#ffffff");
                    drawGrid();
                    return;
                }
                handleDrawing(e);
            });
            
            document.addEventListener("mouseup", function() {
                isDrawing = false;
                isErasing = false;
                isPanning = false;
                canvas.style.cursor = spaceHeld ? "grab" : "default";
            });
            
            drawGrid();
            
            colorPicker.addEventListener("input", function(e) {
                currentColor = e.target.value;
                swatches[selectedSwatch] = currentColor;
                buildPalette();
            });
            
            document.addEventListener("keydown", function(e) {
                if (e.key === "e") setTool("Eraser");
                if (e.key === "f") setTool("Fill");
                if (e.key === "b") setTool("Brush");
                if (e.key === "i") setTool("Eyedropper");
                if (e.shiftKey && e.key === "X") isSymmetricalX = !isSymmetricalX;
                if (e.shiftKey && e.key === "Y") isSymmetricalY = !isSymmetricalY;
                if (e.key === "=") {
                    zoomLevel = Math.min(zoomLevel + 0.5, 8);
                    panX = Math.min(0, Math.max(panX, -(GRID_SIZE * CELL_SIZE * zoomLevel - canvas.width)));
                    panY = Math.min(0, Math.max(panY, -(GRID_SIZE * CELL_SIZE * zoomLevel - canvas.height)));
                    drawGrid();
                }
                if (e.key === "-") {
                    zoomLevel = Math.max(zoomLevel - 0.5, 1);
                    panX = Math.min(0, Math.max(panX, -(GRID_SIZE * CELL_SIZE * zoomLevel - canvas.width)));
                    panY = Math.min(0, Math.max(panY, -(GRID_SIZE * CELL_SIZE * zoomLevel - canvas.height)));
                    drawGrid();
                }
                if (e.key === " ") {
                    e.preventDefault();
                    spaceHeld = true;
                    canvas.style.cursor = "grab";
                }
                if (e.ctrlKey && e.key === "Backspace") {
                    saveSnapshot();
                    for (let i = 0; i < GRID_SIZE; i++) {
                        for (let k = 0; k < GRID_SIZE; k++) {
                            grid[i][k] = "#ffffff";
                        }
                    }
                    drawGrid();
                }
                if (e.ctrlKey && e.shiftKey && e.key === "S") {
                    e.preventDefault();
                    let newLink = document.createElement("a");
                    newLink.href = canvas.toDataURL();
                    newLink.download = "pixel-art.png";
                    newLink.click();
                }
                if (e.ctrlKey && e.key === "s") {
                    e.preventDefault();
                    exportJSON();
                }
                if (e.ctrlKey && e.shiftKey && e.key === "O") {
                    e.preventDefault();
                    document.querySelector("#JSONImport").click();
                }
                if (e.ctrlKey && e.key === "h") {
                    e.preventDefault();
                    isGridOn = !isGridOn;
                    drawGrid();
                }
                if (e.ctrlKey && e.key === "z") {
                    e.preventDefault();
                    undo();
                }
                if (e.ctrlKey && e.key === "y") {
                    e.preventDefault();
                    redo();
                }
                if (e.ctrlKey && e.shiftKey && e.key === "P") {
                    e.preventDefault();
                    exportPalette();
                }
                if (e.ctrlKey && e.key === "p") {
                    e.preventDefault();
                    document.querySelector("#paletteImport").click();
                }
                if (e.key === "ArrowRight") {
                    e.preventDefault();
                    let row = selectedSwatch % 16;
                    let col = Math.floor(selectedSwatch / 16);
                    col = (col + 1) % 4;
                    selectedSwatch = col * 16 + row;
                    currentColor = swatches[selectedSwatch];
                    buildPalette();
                }
                if (e.key === "ArrowLeft") {
                    e.preventDefault();
                    let row = selectedSwatch % 16;
                    let col = Math.floor(selectedSwatch / 16);
                    col = (col + 3) % 4;
                    selectedSwatch = col * 16 + row;
                    currentColor = swatches[selectedSwatch];
                    buildPalette();
                }
                if (e.key === "ArrowDown") {
                    e.preventDefault();
                    let row = selectedSwatch % 16;
                    let col = Math.floor(selectedSwatch / 16);
                    row = (row + 1) % 16;
                    selectedSwatch = col * 16 + row;
                    currentColor = swatches[selectedSwatch];
                    buildPalette();
                }
                if (e.key === "ArrowUp") {
                    e.preventDefault();
                    let row = selectedSwatch % 16;
                    let col = Math.floor(selectedSwatch / 16);
                    row = (row + 15) % 16;
                    selectedSwatch = col * 16 + row;
                    currentColor = swatches[selectedSwatch];
                    buildPalette();
                }
                if (e.key === "[") {
                    brushSize = subtractBrushSize();
                    updateBrushButton();
                }
                if (e.key === "]") {
                    brushSize = addBrushSize();
                    updateBrushButton();
                }
                if (e.key === "m") {
                    document.documentElement.classList.toggle("light");
                }
            });
            
            document.addEventListener("keyup", function(e) {
                if (e.key === " ") {
                    spaceHeld = false;
                    isPanning = false;
                    canvas.style.cursor = "default";
                }
            });
            
            function floodFill(row, col, targetColor) {
                if (row < 0 || row >= GRID_SIZE || col < 0 || col >= GRID_SIZE) return;
                if (grid[row][col] !== targetColor) return;
                if (targetColor === currentColor) return;
                grid[row][col] = currentColor;
                floodFill(row - 1, col, targetColor);
                floodFill(row + 1, col, targetColor);
                floodFill(row, col - 1, targetColor);
                floodFill(row, col + 1, targetColor);
            }
            
            function setTool(tool) {
                currentTool = tool;
                document.title = "Pixl8d - " + tool;
            }
            
            function exportJSON() {
                let data = { size: GRID_SIZE, grid: grid, palette: swatches };
                let json = JSON.stringify(data);
                let blob = new Blob([json], { type: "application/json" });
                let object = URL.createObjectURL(blob);
                let link = document.createElement("a");
                link.href = object;
                link.download = "pixel-art.json";
                link.click();
            }
            
            document.querySelector("#JSONImport").addEventListener("change", function(e) {
                let file = e.target.files[0];
                let reader = new FileReader();
                reader.onload = function(e) {
                    let data = JSON.parse(e.target.result);
                    GRID_SIZE = data.size;
                    CELL_SIZE = canvas.width / GRID_SIZE;
                    swatches = data.palette;
                    grid = data.grid;
                    zoomLevel = 1;
                    panX = 0;
                    panY = 0;
                    updateSizeButton();
                    drawGrid();
                    buildPalette();
                };
                reader.readAsText(file);
            });
            
            function saveSnapshot() {
                undoStack.push(JSON.parse(JSON.stringify(grid)));
                redoStack = [];
            }
            
            function undo() {
                if (undoStack.length === 0) return;
                redoStack.push(JSON.parse(JSON.stringify(grid)));
                grid = undoStack.pop();
                drawGrid();
            }
            
            function redo() {
                if (redoStack.length === 0) return;
                undoStack.push(JSON.parse(JSON.stringify(grid)));
                grid = redoStack.pop();
                drawGrid();
            }
            
            window.addEventListener("beforeunload", function(e) {
                e.preventDefault();
            });

            function buildPalette() {
                palette.innerHTML = "";
                for (let i = 0; i < swatches.length; i++) {
                    let color = swatches[i];
                    let newDiv = document.createElement("div");
                    newDiv.style.backgroundColor = color;
                    newDiv.style.width = "31px";
                    newDiv.style.height = "31px";
                    newDiv.style.borderRadius = "50%";
                    newDiv.style.border = i === selectedSwatch ? "2px solid white" : "2px solid transparent";
                    newDiv.style.flexShrink = "0";
                    newDiv.style.cursor = "pointer";
                    newDiv.addEventListener("click", function() {
                        selectedSwatch = i;
                        currentColor = swatches[i];
                        buildPalette();
                    });
                    newDiv.addEventListener("dblclick", function() {
                        selectedSwatch = i;
                        colorPicker.value = swatches[i];
                        colorPicker.click();
                    });
                    palette.appendChild(newDiv);
                }
            }
            buildPalette();

            function exportPalette() {
                let text = swatches.map(color => color.replace("#", "")).join("\n");
                let blob = new Blob([text], { type: "text/plain" });
                let object = URL.createObjectURL(blob);
                let link = document.createElement("a");
                link.href = object;
                link.download = "palette.hex";
                link.click();
            }
            
            document.querySelector("#paletteImport").addEventListener("change", function(e) {
                let file = e.target.files[0];
                let reader = new FileReader();
                reader.onload = function(e) {
                    let lines = e.target.result.split("\n");
                    swatches = lines.filter(line => line.trim() !== "").map(line => "#" + line.trim());
                    selectedSwatch = 0;
                    currentColor = swatches[0];
                    buildPalette();
                };
                reader.readAsText(file);
            });

            function addBrushSize() {
                if (brushSize == 1) return 2;
                if (brushSize == 2) return 4;
                if (brushSize == 4) return 8;
                if (brushSize == 8) return 8;
            }

            function subtractBrushSize() {
                if (brushSize == 1) return 1;
                if (brushSize == 2) return 1;
                if (brushSize == 4) return 2;
                if (brushSize == 8) return 4;
            }
        </script>
    </body>
</html>
